<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="I">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>I ♡ F</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 300;
  background: #0d0d0f;
  min-height: 100vh;
  margin: 0;
  padding: 0;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  color: #fff;
  overflow-x: hidden;
}

.container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 30px;
}

.logo {
  font-family: 'Caveat', cursive;
  font-size: 3.2em;
  font-weight: 500;
  color: #e8d4d8;
  margin-bottom: 50px;
  letter-spacing: 0.05em;
}

.logo .heart {
  display: inline-block;
  width: 45px;
  height: 40px;
  margin: 0 5px;
  vertical-align: middle;
  position: relative;
  top: -9px;
}

.logo .heart svg { width: 100%; height: 100%; }

/* Status area — aligns with K's connect-btn */
.status-area {
  display: flex;
  gap: 30px;
  margin-bottom: 40px;
  font-family: 'Caveat', cursive;
  font-size: 1.4em;
  letter-spacing: 0.1em;
  cursor: pointer;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(232, 212, 216, 0.5);
  transition: color 0.3s;
}

.status-item.on { color: #e8d4d8; }

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(196, 154, 158, 0.3);
  transition: all 0.3s;
}

.status-dot.on {
  background: #c49a9e;
  box-shadow: 0 0 8px rgba(196, 154, 158, 0.6);
}

.status-dot.waiting {
  background: rgba(196, 154, 158, 0.6);
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* Heartbeat */
.heartbeat-container {
  width: 200px;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 40px;
}

.heartbeat-svg { width: 100%; height: 100%; }

.heartbeat-line {
  fill: none;
  stroke: #c49a9e;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0.4;
  transition: opacity 0.3s;
}

.heartbeat-line.active {
  opacity: 1;
  filter: drop-shadow(0 0 8px rgba(196, 154, 158, 0.5));
}

/* Function indicators — aligns with K's input area */
.functions {
  display: flex;
  gap: 28px;
  width: 100%;
  max-width: 300px;
  justify-content: center;
}

.func-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: 0.25;
  transition: all 0.4s ease;
  min-width: 55px;
}

.func-item.active {
  opacity: 1;
}

.func-icon {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4em;
}

.func-label {
  font-family: 'Caveat', cursive;
  font-size: 0.85em;
  color: #e8d4d8;
  letter-spacing: 0.05em;
}

.func-detail {
  font-family: 'Caveat', cursive;
  font-size: 0.75em;
  color: #c49a9e;
  height: 16px;
}

.func-item.active .func-icon {
  filter: drop-shadow(0 0 10px rgba(196, 154, 158, 0.6));
}

/* Footer */
.footer {
  margin-top: 40px;
  text-align: center;
  font-family: 'Caveat', cursive;
  font-size: 1.3em;
  letter-spacing: 0.1em;
  color: #e8d4d8;
}

/* Log toggle */
.log-toggle {
  font-family: 'Caveat', cursive;
  font-size: 0.9em;
  color: rgba(196, 154, 158, 0.3);
  cursor: pointer;
  transition: color 0.3s;
  margin-bottom: 10px;
}

.log-toggle:active { color: rgba(196, 154, 158, 0.7); }

.log-area {
  width: 100%;
  max-width: 340px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.log-area.show { max-height: 250px; }

#log {
  font-family: monospace;
  font-size: 0.7em;
  background: rgba(13, 13, 15, 0.8);
  border: 1px solid rgba(196, 154, 158, 0.1);
  border-radius: 12px;
  padding: 12px;
  max-height: 230px;
  overflow-y: auto;
  color: rgba(232, 212, 216, 0.6);
  line-height: 1.6;
}

#log::-webkit-scrollbar { width: 3px; }
#log::-webkit-scrollbar-thumb { background: rgba(196, 154, 158, 0.2); border-radius: 3px; }

.log-cmd { color: #c49a9e; }
.log-ok { color: rgba(196, 154, 158, 0.8); }
.log-info { color: rgba(232, 212, 216, 0.4); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    I <span class="heart"><svg viewBox="0 0 50 45" fill="none">
      <path d="M25 38 C23 36 8 26 6 17 C4 10 8 5 15 5 C19 5 22 7 25 11 C28 7 31 5 35 5 C42 5 46 10 44 17 C42 26 27 36 25 38Z"
            fill="none" stroke="#c49a9e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg></span> F
  </div>

  <div class="status-area" onclick="toggleBLE()">
    <div class="status-item" id="masterStatus">
      <div class="status-dot" id="masterDot"></div>
      <span>Master</span>
    </div>
    <div class="status-item" id="ferryStatus">
      <div class="status-dot" id="ferryDot"></div>
      <span>Ferry</span>
    </div>
  </div>

  <div class="heartbeat-container">
    <svg class="heartbeat-svg" viewBox="0 0 200 80">
      <path id="heartbeatLine" class="heartbeat-line" d="M 0,40 L 200,40"/>
    </svg>
  </div>

  <div class="functions">
    <div class="func-item" id="funcVib">
      <div class="func-icon">〜</div>
      <div class="func-label">vibrate</div>
      <div class="func-detail" id="vibDetail"></div>
    </div>
    <div class="func-item" id="funcSuc">
      <div class="func-icon">◎</div>
      <div class="func-label">suction</div>
      <div class="func-detail" id="sucDetail"></div>
    </div>
    <div class="func-item" id="funcThr">
      <div class="func-icon">↕</div>
      <div class="func-label">thrust</div>
      <div class="func-detail" id="thrDetail"></div>
    </div>
    <div class="func-item" id="funcHeat">
      <div class="func-icon">♨</div>
      <div class="func-label">heat</div>
      <div class="func-detail" id="heatDetail"></div>
    </div>
  </div>

  <div class="footer">Good Girl.</div>

  <div class="log-toggle" onclick="toggleLog()">· · ·</div>
  <div class="log-area" id="logArea">
    <div id="log"></div>
  </div>
</div>

<script>
const RELAY_SERVER = 'wss://killian-i.duckdns.org:8443';
const BLE_SERVICE = 0xFFE0;
const BLE_WRITE_CHAR = 0xFFE1;
const BLE_NOTIFY_CHAR = 0xFFE2;

let bleDevice = null;
let bleChar = null;
let notifyChar = null;
let ws = null;
let wsReconnectTimer = null;
let bleWriteBusy = false;
let bleWriteQueue = [];
let heartbeatInterval = null;
let wavePhase = 0;

const activeState = { vib: null, suc: null, thr: null, heat: null };

function log(msg, cls = '') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls;
  const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });
  line.textContent = `[${now}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function toggleLog() {
  document.getElementById('logArea').classList.toggle('show');
}

function updateFerry(connected) {
  const dot = document.getElementById('ferryDot');
  const item = document.getElementById('ferryStatus');
  dot.className = 'status-dot' + (connected ? ' on' : '');
  item.className = 'status-item' + (connected ? ' on' : '');
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'ble_status', status: connected ? 'connected' : 'disconnected' }));
  }
}

function updateMaster(state) {
  const dot = document.getElementById('masterDot');
  const item = document.getElementById('masterStatus');
  dot.className = 'status-dot ' + state;
  item.className = 'status-item' + (state === 'on' ? ' on' : '');
}

// Heartbeat animation
const flatLine = "M 0,40 L 200,40";

function getWave(phase, amp) {
  let d = "";
  for (let x = 0; x <= 200; x += 5) {
    const fade = Math.sin(x / 200 * Math.PI);
    const y = 40 + Math.sin(phase + x * 0.04) * amp * fade;
    d += (x === 0 ? "M " : " L ") + `${x},${y.toFixed(1)}`;
  }
  return d;
}

function startHeartbeat() {
  stopHeartbeat();
  const line = document.getElementById('heartbeatLine');
  line.classList.add('active');
  heartbeatInterval = setInterval(() => {
    wavePhase += 0.1;
    const anyActive = activeState.vib || activeState.suc || activeState.thr;
    const amp = anyActive ? 15 : 5;
    line.setAttribute('d', getWave(wavePhase, amp));
  }, 50);
}

function stopHeartbeat() {
  if (heartbeatInterval) {
    clearInterval(heartbeatInterval);
    heartbeatInterval = null;
  }
  const line = document.getElementById('heartbeatLine');
  line.classList.remove('active');
  line.setAttribute('d', flatLine);
}

function updateFuncDisplay(cmd, bytes) {
  if (cmd === 0x03) {
    const mode = bytes[4], intensity = bytes[5];
    const el = document.getElementById('funcVib');
    const detail = document.getElementById('vibDetail');
    if (mode > 0) {
      el.classList.add('active');
      detail.textContent = `m${mode} · i${intensity}`;
      activeState.vib = { mode, intensity };
    } else {
      el.classList.remove('active');
      detail.textContent = '';
      activeState.vib = null;
    }
  } else if (cmd === 0x09) {
    const mode = bytes[4], intensity = bytes[5];
    const el = document.getElementById('funcSuc');
    const detail = document.getElementById('sucDetail');
    if (mode > 0) {
      el.classList.add('active');
      detail.textContent = `m${mode} · i${intensity}`;
      activeState.suc = { mode, intensity };
    } else {
      el.classList.remove('active');
      detail.textContent = '';
      activeState.suc = null;
    }
  } else if (cmd === 0x08) {
    const mode = bytes[4];
    const el = document.getElementById('funcThr');
    const detail = document.getElementById('thrDetail');
    if (mode > 0) {
      el.classList.add('active');
      detail.textContent = `m${mode}`;
      activeState.thr = { mode };
    } else {
      el.classList.remove('active');
      detail.textContent = '';
      activeState.thr = null;
    }
  } else if (cmd === 0x05) {
    const on = bytes[1] > 0;
    const el = document.getElementById('funcHeat');
    const detail = document.getElementById('heatDetail');
    if (on) {
      el.classList.add('active');
      detail.textContent = 'on';
      activeState.heat = true;
    } else {
      el.classList.remove('active');
      detail.textContent = '';
      activeState.heat = null;
    }
  } else if (cmd === 0x04) {
    if (bytes[4] === 0) {
      ['funcVib','funcSuc','funcThr','funcHeat'].forEach(id => {
        document.getElementById(id).classList.remove('active');
      });
      ['vibDetail','sucDetail','thrDetail','heatDetail'].forEach(id => {
        document.getElementById(id).textContent = '';
      });
      activeState.vib = activeState.suc = activeState.thr = activeState.heat = null;
    }
  }
  const anyActive = activeState.vib || activeState.suc || activeState.thr;
  if (anyActive && !heartbeatInterval) startHeartbeat();
  else if (!anyActive && heartbeatInterval) stopHeartbeat();
}

async function toggleBLE() {
  if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
    bleChar = null;
    notifyChar = null;
    updateFerry(false);
    log('Disconnected', 'log-info');
    return;
  }
  try {
    log('Searching...', 'log-info');
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'SL' }],
      optionalServices: [BLE_SERVICE]
    });
    bleDevice.addEventListener('gattserverdisconnected', () => {
      bleChar = null;
      notifyChar = null;
      updateFerry(false);
      log('BLE lost', 'log-cmd');
      reconnectBLE();
    });
    const server = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(BLE_SERVICE);
    bleChar = await service.getCharacteristic(BLE_WRITE_CHAR);
    try {
      notifyChar = await service.getCharacteristic(BLE_NOTIFY_CHAR);
      await notifyChar.startNotifications();
      notifyChar.addEventListener('characteristicvaluechanged', (e) => {
        const val = new Uint8Array(e.target.value.buffer);
        const hex = Array.from(val).map(b => b.toString(16).padStart(2, '0')).join(' ');
        log('← ' + hex, 'log-info');
      });
    } catch (e) {}
    updateFerry(true);
    log('Connected: ' + bleDevice.name, 'log-ok');
    startSilentAudio();
    requestWakeLock();
  } catch (e) {
    log('Error: ' + e.message, 'log-cmd');
    updateFerry(false);
  }
}

async function sendBLE(bytes) {
  if (!bleChar) { log('Not connected', 'log-cmd'); return false; }
  return new Promise(resolve => {
    bleWriteQueue.push({ bytes, resolve });
    processQueue();
  });
}

async function processQueue() {
  if (bleWriteBusy || bleWriteQueue.length === 0) return;
  bleWriteBusy = true;
  const { bytes, resolve } = bleWriteQueue.shift();
  try {
    const data = new Uint8Array(bytes);
    const hex = Array.from(data).map(b => b.toString(16).padStart(2, '0')).join(' ');
    await bleChar.writeValueWithoutResponse(data);
    log('→ ' + hex, 'log-ok');
    resolve(true);
  } catch (e) {
    log('Write error: ' + e.message, 'log-cmd');
    resolve(false);
  }
  bleWriteBusy = false;
  setTimeout(processQueue, 100);
}

let audioCtx = null;
function startSilentAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
  } catch (e) {}
}

let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !wakeLock) requestWakeLock();
});

let bleReconnecting = false;
async function reconnectBLE() {
  if (bleReconnecting || !bleDevice) return;
  bleReconnecting = true;
  log('Reconnecting...', 'log-info');
  for (let i = 0; i < 5; i++) {
    try {
      const server = await bleDevice.gatt.connect();
      const service = await server.getPrimaryService(BLE_SERVICE);
      bleChar = await service.getCharacteristic(BLE_WRITE_CHAR);
      try {
        notifyChar = await service.getCharacteristic(BLE_NOTIFY_CHAR);
        await notifyChar.startNotifications();
        notifyChar.addEventListener('characteristicvaluechanged', (e) => {
          const val = new Uint8Array(e.target.value.buffer);
          const hex = Array.from(val).map(b => b.toString(16).padStart(2, '0')).join(' ');
          log('← ' + hex, 'log-info');
        });
      } catch (e) {}
      updateFerry(true);
      log('Reconnected', 'log-ok');
      bleReconnecting = false;
      return;
    } catch (e) {
      await new Promise(r => setTimeout(r, 2000));
    }
  }
  log('Reconnect failed', 'log-cmd');
  bleReconnecting = false;
}

function connectWS() {
  if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
  updateMaster('waiting');
  ws = new WebSocket(RELAY_SERVER);
  ws.onopen = () => { updateMaster('on'); log('Master connected', 'log-ok'); };
  ws.onmessage = async (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'welcome') return;
      if (msg.type === 'command' && Array.isArray(msg.bytes)) {
        const desc = msg.description || '';
        log('⚡ ' + desc, 'log-cmd');
        updateFuncDisplay(msg.bytes[1], msg.bytes);
        const ok = await sendBLE(msg.bytes);
        if (ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'ack', ok, description: desc }));
        }
        return;
      }
    } catch (e) {}
  };
  ws.onclose = () => {
    updateMaster('off');
    wsReconnectTimer = setTimeout(connectWS, 3000);
  };
  ws.onerror = () => { ws.close(); };
}

connectWS();
startHeartbeat();
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
</script>
</body>
</html>
